<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OAuth completado</title>
  <style>
    :root {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #f6f7fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 20px;
      background:
        linear-gradient(120deg, rgba(36, 87, 197, 0.08), transparent 35%),
        linear-gradient(300deg, rgba(18, 113, 91, 0.08), transparent 36%),
        #f6f7fb;
    }

    main {
      width: min(440px, 100%);
      border: 1px solid #d9dee8;
      border-radius: 8px;
      padding: 26px;
      background: #ffffff;
      box-shadow: 0 18px 45px rgba(16, 24, 40, 0.10);
      text-align: center;
    }

    .mark {
      display: grid;
      width: 54px;
      height: 54px;
      place-items: center;
      margin: 0 auto 16px;
      border-radius: 8px;
      background: #e9f7f2;
      color: #12715b;
      font-size: 1.7rem;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 0;
    }

    p {
      margin: 10px 0 0;
      color: #667085;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">OK</div>
    <h1>Login con Google completado</h1>
    <p>Estamos preparando tu sesion y regresando al panel.</p>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    window.setTimeout(() => {
      window.location.href = `index.html${token ? `?token=${encodeURIComponent(token)}` : ""}`;
    }, 900);
  </script>
</body>
</html>
